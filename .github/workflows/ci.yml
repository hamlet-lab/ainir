name: public-demo-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pinned to actions/checkout v5 release tag commit 93cb6efe18208431cddfb8368fd83d5badbf9bfd.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
      # Pinned to actions/setup-python v6 release tag commit a309ff8b426b58ec0e2a45f0f869d46889d02405.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.lock.txt
      # Pinned to actions/setup-node v5 release tag commit a0853c24544627f65ddf259abe73b1d18a591444.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
      - name: Install Node dependencies from package-lock
        run: |
          npm ci
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Install package and test dependencies with locked constraints
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements.lock.txt -e ".[dev]"

      - name: Phase 30 v1.0 RC candidate quick integrity check
        run: python scripts/run_phase30_v1_rc_candidate_check.py --mode quick-integrity
