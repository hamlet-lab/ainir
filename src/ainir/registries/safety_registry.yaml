trusted_execution_context:
  environments:
  - public_demo
  - test
  - staging
  - production
  test_like:
  - public_demo
  - test
  production:
  - production
effect_families:
  payment:
    description: Any registered payment effect marker.
    includes_all:
    - payment
  notification:
    description: Email or notification effect marker.
    includes_any:
    - email
    - notification
  secret:
    description: Secret or token effect marker.
    includes_any:
    - secret
    - token
  privacy:
    description: Privacy or PII effect marker.
    includes_any:
    - privacy
    - pii
  destructive:
    description: Destructive effect marker.
    includes_any:
    - destructive
lowering_type_allowlist:
- Record<string, unknown>
- unknown
- string
- number
- boolean
- CreateUserInput
- CreateUserResult
- PasswordResetInput
- AcceptedResponse
- PaymentIntentInput
- PaymentResult
- PIIExportJob
- ExportPackageRef
- AccountDeletionJob
- DeletionResult
lowering_return_allowlist:
- state
- input
