module: demo.password_reset_raw_token_blocked
workflow: PasswordReset
task: PasswordResetRequest
environment: staging
executable: false
input_type: PasswordResetInput
output_type: AcceptedResponse
claims:
  - id: claim.reset_token_is_safe
    status: hypothesized
    statement: "The reset token handling is safe."
operations:
  - id: op.normalize_email
    op: data.normalize_email
    effects: []
  - id: op.lookup_user
    op: db.find_user_by_email
    effects: [effect.storage.db.read]
    capabilities: [cap.db.user.read]
  - id: op.store_raw_reset_token
    op: db.insert_password_reset_token
    effects: [effect.secret.raw_token.store]
    capabilities: [cap.db.password_reset.write]
  - id: op.enqueue_reset_email
    op: outbox.insert_password_reset_requested
    effects: [effect.storage.outbox.write]
    capabilities: [cap.outbox.write]
return: state
