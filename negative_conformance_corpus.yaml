    - id: op.out
      op: outbox.insert_password_reset_requested
      effects:
      - effect.storage.outbox.write
      capabilities:
      - cap.outbox.write
- id: extra_capability_on_pure_operation_blocked
  expected_status: blocked
  expect_lowering_refused: true
  description: Capabilities outside an operation spec are refused to preserve least
    privilege.
  draft:
    module: demo.extra_capability_fixture
    workflow: CreateUser
    task: CreateUserRequest
    input_type: CreateUserInput
    output_type: CreateUserResult
    return: state
    policies: &id007
    - id: policy.no_direct_email_in_create_user
    - id: policy.transactional_outbox_required
    - id: policy.user_email_unique
    transaction: &id008
      id: tx.create_user
      mode: atomic
      includes:
      - op.insert_user
      - op.outbox
      rollback_on:
      - failure
    operations:
    - id: op.normalize_email
      op: data.normalize_email
      effects: []
      capabilities:
      - cap.payment.charge.real
    - id: op.find
      op: db.exists_user_by_email
      effects:
      - effect.storage.db.read
      capabilities:
      - cap.db.read
    - id: op.insert_user
      op: db.insert_user
      effects: &id009
      - effect.storage.db.write
      capabilities: &id010
      - cap.db.write
      policies: &id011
      - policy.user_email_unique
    - id: op.outbox
      op: outbox.insert_welcome_email_requested
      effects: &id012
      - effect.storage.outbox.write
      capabilities: &id013
      - cap.outbox.write
- id: extra_capability_on_db_read_blocked
  expected_status: blocked
  expect_lowering_refused: true
  description: Extra capabilities outside allowed prefixes are refused even when required
    capabilities are present.
  draft:
    module: demo.extra_capability_db_read_fixture
    workflow: CreateUser
    task: CreateUserRequest
    input_type: CreateUserInput
    output_type: CreateUserResult
    return: state
    policies: *id007
    transaction: *id008
    operations:
    - id: op.normalize_email
      op: data.normalize_email
      effects: []
    - id: op.find
      op: db.exists_user_by_email
      effects:
      - effect.storage.db.read
      capabilities:
      - cap.db.read
      - cap.admin.root
    - id: op.insert_user
      op: db.insert_user
      effects: *id009
      capabilities: *id010
      policies: *id011
    - id: op.outbox
      op: outbox.insert_welcome_email_requested
      effects: *id012
      capabilities: *id013
- id: exact_capability_refuses_excessive_db_scope
  expected_status: blocked
  expect_lowering_refused: true
  description: A registered read operation must not accept unrelated or excessive
    capability markers.
  draft:
    module: demo.negative_conformance
    workflow: CreateUser
    task: CreateUserRequest
    input_type: CreateUserInput
    output_type: CreateUserResult
    policies:
    - id: policy.no_direct_email_in_create_user
    - id: policy.transactional_outbox_required
    transaction:
      id: tx.create_user
      includes:
      - op.insert_user
      - op.outbox
      mode: atomic
    operations:
    - id: op.normalize
      op: data.normalize_email
      effects: []
    - id: op.lookup
      op: db.exists_user_by_email
      effects:
      - effect.storage.db.read
      capabilities:
      - cap.db.delete.everything
    - id: op.insert_user
      op: db.insert_user
      effects:
      - effect.storage.db.write
      capabilities:
      - cap.db.user.write
      policies:
      - policy.user_email_unique
    - id: op.outbox
      op: outbox.insert_welcome_email_requested
      effects:
      - effect.storage.outbox.write
      capabilities:
      - cap.outbox.write
      policies:
      - policy.transactional_outbox_required
- id: exact_capability_requires_allowed_marker
  expected_status: blocked
  expect_lowering_refused: true
  description: A registered operation with capability requirements must not pass with
    an empty capability list.
  draft:
    module: demo.negative_conformance
    workflow: CreateUser
    task: CreateUserRequest
    input_type: CreateUserInput
    output_type: CreateUserResult
    policies:
    - id: policy.no_direct_email_in_create_user
    - id: policy.transactional_outbox_required
    transaction:
      id: tx.create_user
      includes:
      - op.insert_user
      - op.outbox
      mode: atomic
    operations:
    - id: op.normalize
      op: data.normalize_email
      effects: []
    - id: op.lookup
      op: db.exists_user_by_email
      effects:
      - effect.storage.db.read
      capabilities: []
    - id: op.insert_user
      op: db.insert_user
      effects:
      - effect.storage.db.write
      capabilities:
      - cap.db.user.write
      policies:
      - policy.user_email_unique
    - id: op.outbox
      op: outbox.insert_welcome_email_requested
      effects:
      - effect.storage.outbox.write
      capabilities:
      - cap.outbox.write
      policies:
      - policy.transactional_outbox_required
- id: unknown_transaction_field_invalid
  expected_status: invalid
  expect_lowering_refused: true
  description: Transaction bindings must not carry hidden unregistered semantics.
  draft:
    module: demo.create_user_unknown_transaction_field
    workflow: CreateUser
    task: CreateUserRequest
    input_type: CreateUserInput
    output_type: CreateUserResult
    return: state
    policies:
    - id: policy.no_direct_email_in_create_user
    - id: policy.transactional_outbox_required
    - id: policy.user_email_unique
    transaction:
      id: tx.create_user
      mode: atomic
      includes:
      - op.insert_user
      - op.outbox
      hidden_call:
        url: https://example.invalid
    operations:
    - id: op.normalize
      op: data.normalize_email
